
<section class="max-w-4xl mx-auto mt-10">
    @if (product(); as p) {
    <article class="bg-white shadow rounded-xl p-6 flex flex-col md:flex-row items-start gap-6">
        <img src="{{ p.image }}" alt="{{ p.title }}" class="w-full md:w-1/3 h-auto object-cover rounded-lg">
        <div class="flex flex-col gap-2 justify-start">
            <h2 class="text-lg font-semibold mb-4">{{ p.title }}</h2>
            <p class="text-md text-gray-600">price: {{ p.price | currency }}</p>
            <p class="text-md font-bold">{{ p.category }}</p>
            <div class="mt-4 ">
                <h3 class="mt-4 font-medium ">Description:</h3>
                <p class="text-gray-700">{{ p.description }}</p>
            </div>
        </div>
    </article>
    } @else {
    <p class="text-center text-gray-500">Producto no encontrado</p>
    }

    <button (click)="goBack()" class="mt-4 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
        ← Back to Books
    </button>
</section>
